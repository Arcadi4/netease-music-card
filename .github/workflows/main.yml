name: NeteaseMusic
on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Restore duration snapshot
        run: |
          git fetch origin svg
          git checkout origin/svg -- duration-snapshot.json || true
          test -f duration-snapshot.json || printf '{}' > duration-snapshot.json
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
      - name: Run cardgen
        run: go run ./cmd/cardgen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETEASE_USER_ID: ${{ vars.NETEASE_USER_ID }}
          NETEASE_USER_TOKEN: ${{ secrets.NETEASE_USER_TOKEN }}
          OUTPUT_BRANCH: "svg"
