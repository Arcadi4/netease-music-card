name: UpdateCards
permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"
      - name: Restore data artifacts
        run: |
          mkdir -p data
          git fetch origin svg:refs/remotes/origin/svg || true
          git checkout origin/svg -- data/top-artists.json data/top-tracks.json data/weekly-overview.json data/card-input.json 2>/dev/null || true
          
          # Create defaults if files don't exist
          [ -f data/top-artists.json ] || echo '[]' > data/top-artists.json
          [ -f data/top-tracks.json ] || echo '[]' > data/top-tracks.json
          [ -f data/weekly-overview.json ] || echo '{"totalPlays":0,"uniqueSongs":0,"uniqueArtists":0,"repeatIntensity":"0"}' > data/weekly-overview.json
          [ -f data/card-input.json ] || echo '{"nickname":"","songName":"","songAuthors":"","playCount":0,"authFailed":true}' > data/card-input.json
      - name: Run cardgen
        run: go run ./cmd/cardgen
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NETEASE_USER_ID: ${{ vars.NETEASE_USER_ID }}
          NETEASE_USER_TOKEN: ${{ secrets.NETEASE_USER_TOKEN }}
          OUTPUT_BRANCH: "svg"
