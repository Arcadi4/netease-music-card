<svg width="310" height="352" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <foreignObject width="310" height="352">
        <div xmlns="http://www.w3.org/1999/xhtml" class="container" style="padding: 5px;">
        <style>
            * {
                box-sizing: border-box;
                font-family: 'PingFang SC', 'Helvetica Neue', 'Segoe UI', 'Microsoft YaHei', sans-serif !important;
                margin: 0;
                padding: 0;
            }
            .card {
                background: white;
                border-radius: 10px;
                box-shadow: gray 0 0 10px;
                overflow: hidden;
                padding: 20px;
                height: 342px;
                display: flex;
                flex-direction: column;
            }
            .header {
                margin-bottom: 15px;
            }
            .title {
                font-size: 18px;
                font-weight: bold;
                color: #333;
            }
            .subtitle {
                font-size: 12px;
                color: #888;
                margin-top: 2px;
            }
            .row {
                display: flex;
                align-items: center;
                margin-bottom: 12px;
            }
            .row:last-child {
                margin-bottom: 0;
            }
            .rank {
                background: #BA0400;
                color: white;
                font-size: 14px;
                font-weight: bold;
                width: 24px;
                height: 24px;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-right: 12px;
                flex-shrink: 0;
            }
            .info {
                flex-grow: 1;
                overflow: hidden;
            }
            .name {
                font-size: 14px;
                color: #333;
                font-weight: 500;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .plays {
                font-size: 12px;
                color: #888;
                margin-top: 2px;
            }
            .empty-state {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                color: #888;
            }
        </style>
            <div class="card">
                <div class="header">
                    <div class="title">本周最爱歌手</div>
                    <div class="subtitle">Weekly Top Artists</div>
                </div>
                <div class="list">
                    
                <div class="row">
                    <div class="rank">1</div>
                    <div class="info">
                        <div class="name">ヨルシカ</div>
                        <div class="plays">27 plays</div>
                    </div>
                </div>
            
                <div class="row">
                    <div class="rank">2</div>
                    <div class="info">
                        <div class="name">Low Roar</div>
                        <div class="plays">13 plays</div>
                    </div>
                </div>
            
                <div class="row">
                    <div class="rank">3</div>
                    <div class="info">
                        <div class="name">SawanoHiroyuki[nZk]</div>
                        <div class="plays">13 plays</div>
                    </div>
                </div>
            
                <div class="row">
                    <div class="rank">4</div>
                    <div class="info">
                        <div class="name">Laco</div>
                        <div class="plays">11 plays</div>
                    </div>
                </div>
            
                <div class="row">
                    <div class="rank">5</div>
                    <div class="info">
                        <div class="name">椎名林檎</div>
                        <div class="plays">11 plays</div>
                    </div>
                </div>
            
                </div>
            </div>
        </div>
    </foreignObject>
</svg>