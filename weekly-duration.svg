<svg width="310" height="260" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <foreignObject width="310" height="260">
        <div xmlns="http://www.w3.org/1999/xhtml" class="container" style="padding: 5px;">
        <style>
            * {
                box-sizing: border-box;
                font-family: 'PingFang SC', 'Helvetica Neue', 'Segoe UI', 'Microsoft YaHei', sans-serif !important;
                margin: 0;
                padding: 0;
            }
            .card {
                background: white;
                border-radius: 10px;
                box-shadow: gray 0 0 10px;
                overflow: hidden;
                padding: 20px;
                height: max-content;
                display: flex;
                flex-direction: column;
            }
            .header {
                margin-bottom: 15px;
                text-align: center;
            }
            .title {
                font-size: 18px;
                font-weight: bold;
                color: #333;
            }
            .subtitle {
                font-size: 12px;
                color: #888;
                margin-top: 2px;
            }
            .chart {
                flex-grow: 1;
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                padding: 0 10px;
            }
            .bar-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-end;
                height: 100%;
                width: 30px;
            }
            .bar-label-top {
                font-size: 10px;
                color: #666;
                margin-bottom: 4px;
                height: 12px;
            }
            .bar-wrap {
                width: 100%;
                display: flex;
                align-items: flex-end;
                justify-content: center;
                height: 100px;
            }
            .bar {
                width: 16px;
                border-radius: 3px 3px 0 0;
            }
            .bar.filled {
                background: #BA0400;
            }
            .bar.empty {
                background: #e0e0e0;
                height: 10px !important;
            }
            .bar-day {
                font-size: 11px;
                color: #888;
                margin-top: 8px;
            }
            .empty-state {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                color: #888;
            }
        </style>
            <div class="card">
                <div class="header">
                    <div class="title">本周听歌时长</div>
                    <div class="subtitle">估算时长 · Estimated</div>
                </div>
                <div class="chart">
                <div class="bar-col">
                    <div class="bar-label-top">245m</div>
                    <div class="bar-wrap">
                        <div class="bar filled" style="height: 100px;"></div>
                    </div>
                    <div class="bar-day">Mon</div>
                </div>
                <div class="bar-col">
                    <div class="bar-label-top"></div>
                    <div class="bar-wrap">
                        <div class="bar empty" style="height: 10px;"></div>
                    </div>
                    <div class="bar-day">Tue</div>
                </div>
                <div class="bar-col">
                    <div class="bar-label-top"></div>
                    <div class="bar-wrap">
                        <div class="bar empty" style="height: 10px;"></div>
                    </div>
                    <div class="bar-day">Wed</div>
                </div>
                <div class="bar-col">
                    <div class="bar-label-top"></div>
                    <div class="bar-wrap">
                        <div class="bar empty" style="height: 10px;"></div>
                    </div>
                    <div class="bar-day">Thu</div>
                </div>
                <div class="bar-col">
                    <div class="bar-label-top"></div>
                    <div class="bar-wrap">
                        <div class="bar empty" style="height: 10px;"></div>
                    </div>
                    <div class="bar-day">Fri</div>
                </div>
                <div class="bar-col">
                    <div class="bar-label-top"></div>
                    <div class="bar-wrap">
                        <div class="bar empty" style="height: 10px;"></div>
                    </div>
                    <div class="bar-day">Sat</div>
                </div>
                <div class="bar-col">
                    <div class="bar-label-top"></div>
                    <div class="bar-wrap">
                        <div class="bar empty" style="height: 10px;"></div>
                    </div>
                    <div class="bar-day">Sun</div>
                </div></div>
            </div>
        </div>
    </foreignObject>
</svg>