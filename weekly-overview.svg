<svg width="310" height="274" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <foreignObject width="310" height="274">
        <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 5px;">
        <style>
            * {
                box-sizing: border-box;
                font-family: 'PingFang SC', 'Helvetica Neue', 'Segoe UI', 'Microsoft YaHei', sans-serif !important;
                margin: 0;
                padding: 0;
            }
            .card {
                background: white;
                border-radius: 10px;
                box-shadow: gray 0 0 10px;
                width: 300px;
                height: 264px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .header {
                padding: 15px;
                border-bottom: 1px solid #eee;
                text-align: center;
            }
            .title {
                font-size: 18px;
                font-weight: bold;
                color: #333;
            }
            .subtitle {
                font-size: 12px;
                color: #999;
                margin-top: 2px;
            }
            .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                flex: 1;
            }
            .cell {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                border-right: 1px solid #f5f5f5;
                border-bottom: 1px solid #f5f5f5;
                min-height: 60px;
                padding: 12px 8px;
            }
            .cell:nth-child(2n) {
                border-right: none;
            }
            .cell:nth-child(n+3) {
                border-bottom: none;
            }
            .value {
                font-size: 28px;
                font-weight: bold;
                color: #BA0400;
            }
            .label {
                font-size: 11px;
                color: #666;
                margin-top: 4px;
            }
        </style>
            <div class="card">
                <div class="header">
                    <div class="title">本周概览</div>
                    <div class="subtitle">Weekly Overview</div>
                </div>
                <div class="grid">
                    <div class="cell">
                        <div class="value">149</div>
                        <div class="label">总播放 / Total Plays</div>
                    </div>
                    <div class="cell">
                        <div class="value">100</div>
                        <div class="label">不同歌曲 / Unique Songs</div>
                    </div>
                    <div class="cell">
                        <div class="value">85</div>
                        <div class="label">不同艺术家 / Artists</div>
                    </div>
                    <div class="cell">
                        <div class="value">8.7%</div>
                        <div class="label">重复强度 / Repeat %</div>
                    </div>
                </div>
            </div>
        </div>
    </foreignObject>
</svg>